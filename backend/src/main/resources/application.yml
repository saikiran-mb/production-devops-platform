spring:
  datasource:
    # DB_HOST defaults to localhost for bare `mvn spring-boot:run` on your host.
    # Docker Compose overrides DB_HOST=postgres so this resolves to the
    # Postgres container by its service name instead.
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/deploytracker
    username: deploytracker_user
    password: ${DB_PASSWORD}   # never hardcode — pull from env var
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only checks it matches
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
