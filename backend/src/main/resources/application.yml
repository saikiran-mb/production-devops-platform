spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/deploytracker
    username: deploytracker_user
    password: ${DB_PASSWORD}   # never hardcode — pull from env var
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only checks it matches
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
